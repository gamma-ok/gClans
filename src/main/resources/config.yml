# ============================================================
#                gClans v2.0.0 — Configuración
# ============================================================

database:
  type: sqlite
  sqlite:
    file-name: gclans.db
  mysql:
    host: localhost
    port: 3306
    database: gclans
    username: root
    password: ''
    pool-size: 10
  tables:
    clans: gclans_clans
    members: gclans_members
    allies: gclans_allies

clans:
  name-min-length: 3
  name-max-length: 8
  name-regex: '^[a-zA-Z0-9_]+$'
  name-blacklist:
    - fuck
    - fvck
    - rape
  prefix-min-length: 3
  prefix-max-length: 8
  prefix-regex: '^[a-zA-Z0-9]+$'
  prefix-blocked-codes:
    - '&k'
  require-prefix-on-creation: false
  default-color: 'c'
  default-slots: 8
  # Límite máximo de slots que puede tener un clan (0 = sin límite)
  max-slots: 12
  max-allies: 1

points:
  kill-points: 1.0
  death-points: 0.5

levels:
  xp-per-kill: 1
  # Fórmula de XP para subir de nivel. %level% = nivel actual.
  xp-formula: '%level% * 10'
  max-level: 50

  # Tabla de slots por nivel.
  # Cada entrada es "nivel: slots_a_agregar"
  # El clan recibe +X slots cuando ALCANZA ese nivel exacto.
  # Ejemplo: al llegar al nivel 5 recibe +1 slot, al nivel 10 +2 slots, etc.
  slots-per-level:
    5:  1
    10: 2
    15: 1
    20: 2
    25: 1
    30: 2
    35: 1
    40: 2
    45: 1
    50: 3

cooldowns:
  clan-create: 60

confirmation:
  timeout-seconds: 10

invitations:
  timeout-seconds: 60

chat:
  clan-format: '&a[Clan] {player}&7: &e{message}'
  ally-format: '&9[Ally] &7({clan}) &9{player}&7: &e{message}'
  spy-format: '&d[SpyChat] &7({clan}) &d{player}&7: &e{message}'
  spy-enabled: true

combat:
  protect-members: true
  protect-allies: true

top:
  display-count: 10

list:
  clans-per-page: 10

placeholders:
  no-clan-text: 'Sin Clan'
  no-clan-zero: '0'
  no-prefix-text: 'Sin Prefix'
  name-color: '6'
  prefix-color: 'e'

member-list:
  tooltip-enabled: true
  online-color: 'a'
  offline-color: '7'
  show-clan-kills: true
  kills-format: '&e[&a{kills}&e]'
